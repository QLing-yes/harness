name: Check

on:
  push:
    paths:
      - 'harness/**.md'
      - 'harness/scripts/check.sh'
  pull_request:
    paths:
      - 'harness/**.md'
      - 'harness/scripts/check.sh'

jobs:
  consistency:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - run: sh ./harness/scripts/check.sh
